<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>headspace island</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" href="favicon.ico"/>
</head>

<body>

  <!-- soft particles -->
  <div class="sparkles"></div>

  <!-- cursor -->
  <div id="cursor"></div>

  <main class="island">

    <header class="header">
      <h1>headspace</h1>
      <p>everything feels quiet</p>
    </header>

    <!-- PORTAL -->
    <section class="portal">
      <img src="mewo.png" id="portal" alt="mewo portal"/>
      <span>...</span>
    </section>

    <!-- MUSIC -->
    <section class="panel">
      <h2>music</h2>
      <audio id="audio"></audio>
      <button id="play">play</button>
    </section>

    <!-- STICKERS -->
    <section class="panel">
      <h2>stickers</h2>
      <div id="stickerCanvas"></div>
      <input type="file" id="uploadSticker"/>
    </section>

    <!-- STAMPS -->
    <section class="panel">
      <h2>stamps</h2>
      <div id="stamps"></div>
    </section>

    <!-- GUESTBOOK -->
    <section class="panel">
      <h2>visitor log</h2>

      <input id="name" placeholder="name"/>
      <input id="msg" placeholder="message"/>
      <button id="send">leave trace</button>

      <div id="log"></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
